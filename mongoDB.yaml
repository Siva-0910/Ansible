- name: Install mongodb
  hosts: mongodb
  become: yes
  tasks:
  - name: Copy mongodb repos
    ansible.builtin.copy:
      src: mongo.repo 
      dest: /etc/yum.repos.d/mongo.repo

  - name: Install mongo-org
    ansible.builtin.package:
      name: mongodb-org
      state: installed

  - name: allow remote connection
    ansible.builtin.replace:
      path: /etc/mongo.conf
      regexp: "127.0.0.0"
      replace: "0.0.0.0"

  - name: Restart mongo service
    ansible.builtin.service:
      name: mongodb
      state: restarted    
