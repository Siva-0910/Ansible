- name: Install nginx server
  hosts: frontend
  become: yes
  tasks:
  - name: install nginx
    ansible.builtin.package:
      name: nginx
      state: 
  - name: enable and start nginx
    ansible.builtin.service:
      name: nginx
      status: started
      enabled: yes
